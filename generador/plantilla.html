<div class="filterbar" id="filterbar"></div>
<div class="tabs"><button class="tab on" id="tab-fc" onclick="showTab('fc')">📊 Forecast</button><button class="tab" id="tab-liq" onclick="showTab('liq')">🏷️ Liquidación</button><button class="tab" id="tab-vp" onclick="showTab('vp')">💲 Proyección</button><button class="tab" id="tab-hist" onclick="showTab('hist')">📈 Histórico</button></div>
<div id="view-fc">
<div class="mes-sel" id="mesSel"></div>
<div class="res-toggle" onclick="toggleRes()"><span id="resIco">▾</span> Pedidos Forecast <span class="ln"></span></div>
<div id="resumen"><div id="resumenInner"></div></div>
<div class="mpager"><button onclick="pageMonths('fc',-1)">◀</button><span>◀ ▶ meses</span><button onclick="pageMonths('fc',1)">▶</button></div><div class="tablewrap pg" id="tw-fc"><table id="tabla"></table></div>
</div>
<div id="view-liq" style="display:none">
<div class="liqbar"><span class="liqlbl">Liquidación</span><select id="liqSel" onchange="setLiq()"><option value="">— sin filtro</option><option value="1">× 1</option><option value="1.5">× 1.5</option><option value="2">× 2</option><option value="2.5">× 2.5</option><option value="3">× 3</option><option value="4">× 4</option></select><button class="linkbtn" id="liqResBtn" onclick="toggleLiqRes()">▸ Resumen</button><button class="btnpri" onclick="exportLiqXlsx()">⬇ Generar Excel</button><span class="liqcfg">Contrib. mín: <input id="minCM" type="number" value="10" min="0" max="100" step="1" onchange="setLiqCfg()">% · Dto Liq = Máx − <input id="dtoGap" type="number" value="5" min="0" max="50" step="1" onchange="setLiqCfg()">%</span></div>
<div id="liqResumen" style="display:none"></div>
<div id="liqTot"></div><div class="tablewrap" style="max-height:360px"><table id="tablaLiq"></table></div>
<div class="sec-h" style="margin-top:14px">📄 Preview Excel de liquidación</div>
<div class="tablewrap" style="max-height:360px"><table id="tablaLiqPrev" class="prevt"></table></div><div id="liqCharts"></div>
</div>
<div id="view-vp" style="display:none"></div>
<div id="view-hist" style="display:none"></div>
</div>
<script>
const DATA = /*__DATA__*/;
const MFIELDS=["Stock inicio","Meses inicio","Compra","Venta proy.","Stock final","Meses fin"];
const MSHORT=["Stock I.","Meses I.","Compra","VP","Stock F.","Meses F."];
const ALLM=DATA.months.map((_,i)=>i);
const IDEAL=78;
const PRIORITY=["Motores de arranque","Carcasas","Inducidos","Solenoides","Alternadores","Estatores","Rotores","Bujes de plástico","Portaescobillas de arranque","Portaescobillas de alternador","Escobillas de arranque","Escobillas de alternador","Impulsores","Poleas de alternador","Extractores de polea","Reductores","Planetarios","Reguladores de voltaje","Plaquetas rectificadoras","Diodos","Rodamientos","Lámparas principales","Lámparas auxiliares","Faros y barras"];
function prioName(name){const i=PRIORITY.indexOf(name);return i>=0?i:PRIORITY.length+(DATA.GA.indexOf(name));}
function gaPrio(gi){return prioName(DATA.GA[gi]);}
const DIMS=[["UN","1 · Unidad de negocio","Unidad de negocio","Buscar..."],["GA","2 · Grupo de artículos","Grupo de artículos","Buscar GA..."],["CAT","3 · Categoría","Categoría","Buscar..."],["COD","4 · Código","Código","Buscar código..."]];
const st={UN:new Set(),GA:new Set(),CAT:new Set(),COD:new Set(),RMES:new Set([0]),liq:null,minCM:0.10,dtoGap:0.05,tab:'fc',sort:null,dir:1,liqCM:false,mstart:{fc:0,vp:0,hist:0},liqSort:null,dirty:{fc:true,liq:true,vp:true,hist:true}};
function setLiq(){const v=document.getElementById("liqSel").value;st.liq=v?parseFloat(v):null;renderTab('liq');}
function toggleMB(m){const el=document.getElementById("mb_"+m),b=document.getElementById("mtog_"+m);if(!el)return;const hid=el.style.display==="none";el.style.display=hid?"":"none";b.textContent=hid?"Ocultar":"Mostrar";}
const donutCharts={};
const fmtI=n=>n==null?"–":Math.round(n).toLocaleString("es-AR");
const fmtM=n=>n==null?"–":Number(n).toFixed(1);
const fmtCat=n=>n==null?"–":(Number.isInteger(n)?n:Number(n).toFixed(1));
const fmtU=n=>n==null?"–":"U$D "+Number(n).toLocaleString("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});
const mval=(r,m,f)=>r[6+m*6+f];
const sane=s=>String(s).replace(/[^a-zA-Z0-9]/g,"_");
function mcell(v,ideal,green){let c="";if(green)c="d-grn";else if(v!=null&&ideal!=null&&ideal>0&&v<ideal-2)c="d-red";return `<span class="mwrap"><span class="dot ${c||"dnone"}"></span><span class="mn">${fmtM(v)}</span></span>`;}
function mUN(r){return st.UN.size===0||st.UN.has(r[0]);}
function mGA(r){return st.GA.size===0||st.GA.has(r[1]);}
function mCAT(r){return st.CAT.size===0||st.CAT.has(r[3]);}
function mCOD(r){return st.COD.size===0||st.COD.has(r[2]);}
function visibleRows(){return DATA.rows.filter(r=>mUN(r)&&mGA(r)&&mCAT(r)&&mCOD(r));}
function countBy(rows,k){const m=new Map();rows.forEach(r=>m.set(r[k],(m.get(r[k])||0)+1));return m;}
function resMonths(){return st.RMES.size?[...st.RMES].sort((a,b)=>a-b):[0];}

function buildBar(){let h=DIMS.map(([d,cap,def,ph])=>`<div class="dd" data-dim="${d}"><span class="cap">${cap}</span><button class="dd-btn empty" onclick="openPanel('${d}',event)"><span class="cnt" id="cnt-${d}">Todos</span><span class="dd-cnt" id="qty-${d}"></span><span class="arw">▾</span></button><div class="dd-panel"><input class="mini" id="srch-${d}" placeholder="${ph}" oninput="renderPanel('${d}')"><div class="dd-list" id="list-${d}"></div><div class="dd-foot"><button class="linkbtn" onclick="selectAllF('${d}',event)">Seleccionar todos</button><span id="info-${d}"></span><button class="linkbtn" onclick="clearF('${d}',event)">Limpiar</button></div></div></div>`).join("");
  h+='<div class="clearall"><button class="linkbtn" onclick="clearAll()">✕ Limpiar todo</button></div>';
  document.getElementById('filterbar').innerHTML=h;}
function renderMesSel(){document.getElementById('mesSel').innerHTML='<span class="lbl">Mes (panel):</span>'+DATA.months.map((m,i)=>`<span class="chip ${st.RMES.has(i)?'on':''}" onclick="tglRMes(${i})">${m}</span>`).join("");}
function tglRMes(i){st.RMES.has(i)?st.RMES.delete(i):st.RMES.add(i);renderAll();}
function optionsFor(dim){
  if(dim==='UN'){const c=countBy(DATA.rows,0);return DATA.UN.map((v,i)=>({key:i,label:v,n:c.get(i)||0}));}
  if(dim==='GA'){const b=DATA.rows.filter(mUN);const c=countBy(b,1);return DATA.GA.map((v,i)=>({key:i,label:v,n:c.get(i)||0})).filter(o=>o.n>0).sort((a,b)=>prioName(a.label)-prioName(b.label));}
  if(dim==='CAT'){const b=DATA.rows.filter(r=>mUN(r)&&mGA(r));const c=countBy(b,3);return DATA.CAT.map((v,i)=>({key:i,label:v||'(s/cat)',n:c.get(i)||0})).filter(o=>o.n>0);}
  if(dim==='COD'){const b=DATA.rows.filter(r=>mUN(r)&&mGA(r)&&mCAT(r));return b.map(r=>({key:r[2],label:r[2],sub:DATA.GA[r[1]],n:null}));}
}
function renderPanel(dim){const q=(document.getElementById('srch-'+dim).value||"").toLowerCase();let opts=optionsFor(dim);
  if(q)opts=opts.filter(o=>o.label.toLowerCase().includes(q)||(o.sub&&o.sub.toLowerCase().includes(q)));
  const cap=dim==='COD'?250:999;const shown=opts.slice(0,cap);
  let h=shown.map(o=>{const on=st[dim].has(o.key);const kk=typeof o.key==='number'?o.key:"'"+String(o.key).replace(/'/g,"\\'")+"'";
    return `<div class="it ${on?'on':''}" onclick="toggleOpt('${dim}',${kk})"><input type="checkbox" ${on?'checked':''} onclick="event.stopPropagation();toggleOpt('${dim}',${kk})"><span>${o.label}</span>${o.sub?'<span class="n">'+o.sub+'</span>':(o.n!=null?'<span class="n">'+o.n+'</span>':'')}</div>`;}).join("");
  if(opts.length>cap)h+=`<div style="padding:6px;color:#7986cb;font-size:.67rem">+${opts.length-cap} más… escribí para filtrar</div>`;
  document.getElementById('list-'+dim).innerHTML=h||'<div style="padding:8px;color:#7986cb;font-size:.72rem">Sin opciones</div>';
  document.getElementById('info-'+dim).textContent=st[dim].size?st[dim].size+" sel.":opts.length+" opciones";}
function toggleOpt(dim,key){st[dim].has(key)?st[dim].delete(key):st[dim].add(key);
  if(dim==='UN'){prune('GA',r=>mUN(r),1);prune('CAT',r=>mUN(r)&&mGA(r),3);pruneCOD();}
  if(dim==='GA'){if(st.GA.has(key)){const rr=DATA.rows.find(r=>r[1]===key);if(rr)st.UN.add(rr[0]);}prune('CAT',r=>mUN(r)&&mGA(r),3);pruneCOD();} if(dim==='CAT'){pruneCOD();} if(dim==='COD'){if(st.COD.has(key)){const rr=DATA.rows.find(r=>r[2]===key);if(rr){st.GA.add(rr[1]);st.UN.add(rr[0]);st.CAT.add(rr[3]);}}}
  renderAll();renderPanel(dim);}
function prune(dim,f,k){const av=new Set(DATA.rows.filter(f).map(r=>r[k]));[...st[dim]].forEach(i=>{if(!av.has(i))st[dim].delete(i);});}
function pruneCOD(){const av=new Set(DATA.rows.filter(r=>mUN(r)&&mGA(r)&&mCAT(r)).map(r=>r[2]));[...st.COD].forEach(c=>{if(!av.has(c))st.COD.delete(c);});}
function openPanel(dim,e){e.stopPropagation();const el=document.querySelector('.dd[data-dim="'+dim+'"]');const was=el.classList.contains('open');
  document.querySelectorAll('.dd.open').forEach(d=>d.classList.remove('open'));if(!was){el.classList.add('open');renderPanel(dim);}}
function selectAllF(dim,e){e.stopPropagation();const q=(document.getElementById('srch-'+dim).value||'').toLowerCase();let opts=optionsFor(dim);if(q)opts=opts.filter(o=>o.label.toLowerCase().includes(q)||(o.sub&&o.sub.toLowerCase().includes(q)));
  opts.forEach(o=>st[dim].add(o.key));
  if(dim==='UN'){prune('GA',r=>mUN(r),1);prune('CAT',r=>mUN(r)&&mGA(r),3);pruneCOD();}
  if(dim==='GA'){opts.forEach(o=>{const rr=DATA.rows.find(r=>r[1]===o.key);if(rr)st.UN.add(rr[0]);});prune('CAT',r=>mUN(r)&&mGA(r),3);pruneCOD();}
  if(dim==='COD'){opts.forEach(o=>{const rr=DATA.rows.find(r=>r[2]===o.key);if(rr){st.GA.add(rr[1]);st.UN.add(rr[0]);st.CAT.add(rr[3]);}});}
  if(dim==='CAT'){pruneCOD();}
  renderAll();renderPanel(dim);}
function clearF(dim,e){e.stopPropagation();st[dim].clear();pruneCOD();renderAll();renderPanel(dim);}
function clearAll(){['UN','GA','CAT','COD'].forEach(d=>st[d].clear());st.sort=null;renderAll();}
document.addEventListener('click',e=>{if(!e.target.closest('.dd'))document.querySelectorAll('.dd.open').forEach(d=>d.classList.remove('open'));});
function toggleRes(){const r=document.getElementById('resumen');r.classList.toggle('collapsed');document.getElementById('resIco').textContent=r.classList.contains('collapsed')?'▸':'▾';}
function nameOf(dim,k){if(dim==='UN')return DATA.UN[k];if(dim==='GA')return DATA.GA[k];if(dim==='CAT')return DATA.CAT[k]||'(s/cat)';return k;}
function updBtns(){DIMS.forEach(([d,cap,def])=>{const s=st[d];
  let txt="Todos";if(s.size){const ns=[...s].map(k=>nameOf(d,k));txt=ns.slice(0,2).join(', ')+(ns.length>2?' +'+(ns.length-2):'');}
  document.getElementById('cnt-'+d).textContent=txt;const btn=document.getElementById('cnt-'+d).closest('.dd-btn');btn.classList.toggle('empty',s.size===0);
  document.getElementById('qty-'+d).textContent=s.size>1?s.size:'';});}

function renderLegend(rows){let compra=0,venta=0;rows.forEach(r=>ALLM.forEach(m=>{compra+=mval(r,m,2)||0;venta+=mval(r,m,3)||0;}));const dif=compra-venta;
  document.getElementById('legend').innerHTML=
    `<div><span class="k">Códigos</span><b>${rows.length.toLocaleString("es-AR")}</b> / ${DATA.rows.length.toLocaleString("es-AR")}</div><div class="sep"></div>`+
    `<div><span class="k">Compra confirm. (${ALLM.length}m)</span><b style="color:var(--azul3)">${fmtI(compra)}</b> u</div><div class="sep"></div>`+
    `<div><span class="k">Venta proy. (${ALLM.length}m)</span><b style="color:var(--verde)">${fmtI(venta)}</b> u</div><div class="sep"></div>`+
    `<div><span class="k">Balance</span><b style="color:${dif>=0?'var(--verde)':'var(--rojo)'}">${dif>=0?'+':''}${fmtI(dif)}</b> u</div>`;}

function coverage(gaName,m){let stk=0,vp=0;DATA.rows.forEach(r=>{if(DATA.GA[r[1]]!==gaName)return;if(!(mUN(r)&&mCAT(r)&&mCOD(r)))return;stk+=(mval(r,m,0)||0)+(mval(r,m,2)||0);vp+=mval(r,m,3)||0;});return {stk,vp,pct:stk>0?Math.round(vp/stk*1000)/10:null};}
function renderResumen(){const rms=resMonths();const inner=document.getElementById('resumenInner');
  const scope=[...new Set(visibleRows().map(r=>DATA.GA[r[1]]))];
  const jobs=[]; let html="";
  rms.forEach(m=>{
    const nums={};
    scope.forEach(ga=>{const a=DATA.impo[ga];if(!a)return;const num=a[m].impo;if(num&&/\d/.test(num)&&!nums[num])nums[num]={estado:a[m].estado,disp:a[m].disp,eta:a[m].eta};});
    let keys=Object.keys(nums);
    keys.forEach(num=>{const gas=[];Object.keys(DATA.impo).forEach(ga=>{const im=DATA.impo[ga][m];if(im.impo===num)gas.push({ga,cant:im.cant,pi:im.pi});});
      gas.sort((a,b)=>prioName(a.ga)-prioName(b.ga));nums[num].gas=gas;nums[num].tot=gas.reduce((s,x)=>s+(x.cant||0),0);nums[num].piT=gas.reduce((s,x)=>s+(x.pi||0),0);
      nums[num].prio=Math.min.apply(null,gas.map(g=>prioName(g.ga)));});
    keys.sort((a,b)=>nums[a].prio-nums[b].prio || nums[b].tot-nums[a].tot);
    let block=`<div class="mes-block"><div class="mes-h"><span>${DATA.months[m]}</span><button class="mtog" id="mtog_${m}" onclick="toggleMB(${m})">Ocultar</button></div><div class="mb" id="mb_${m}">`;
    if(keys.length===0){block+='<div class="impo-hint">Sin pedidos de importación para este filtro/mes.</div></div></div>';html+=block;return;}
    keys.forEach(num=>{const o=nums[num];const cls=o.estado==='confirmado'?'b-ok':o.estado==='proyectado'?'b-proy':'b-neu';const lbl=o.estado==='confirmado'?'Confirmado':o.estado==='proyectado'?'Proyectado':'—';
      const totcls=o.estado==='confirmado'?'tot-ok':o.estado==='proyectado'?'tot-proy':'';
      const gasH=o.gas.map(g=>`<div class="g"><span>${g.ga}</span><b>${fmtI(g.cant)}</b><i>${fmtU(g.pi)}</i></div>`).join("");
      const donutGas=o.gas.filter(g=>(g.cant||0)>0).slice(0,6); if(donutGas.length===0)donutGas.push(o.gas[0]);
      let dono="";donutGas.forEach(g=>{const id="dn_"+m+"_"+sane(num)+"_"+sane(g.ga);jobs.push({id,ga:g.ga,m});
        dono+=`<div class="pdonut"><div class="gname">${g.ga}</div><div class="dc"><canvas id="${id}"></canvas><div class="ctr"><b id="${id}_p">–</b><span>VP/stk</span></div></div><div class="cap" id="${id}_c"></div></div>`;});
      block+=`<div class="pedido"><div class="impo"><div class="impo-h"><span class="badge ${cls}">${lbl}</span><span class="code">${num}</span></div>
      <div class="impo-sub"><div>Disponible: <b>${o.disp||'—'}</b></div><div>ETA (−10 días): <b>${o.eta||'—'}</b></div></div>
      <div class="impo-gas">${gasH}</div><div class="impo-tot ${totcls}"><span>Total pedido: ${fmtI(o.tot)} u</span><span>${fmtU(o.piT)}</span></div></div>
      <div class="pdonuts">${dono}</div></div>`;});
    block+="</div></div>";html+=block;
  });
  inner.innerHTML=html||'<div class="impo-hint">Elegí un mes.</div>';
  jobs.forEach(j=>{const cov=coverage(j.ga,j.m);const pe=document.getElementById(j.id+"_p");if(pe)pe.textContent=cov.pct==null?"–":cov.pct.toFixed(1)+"%";
    const ce=document.getElementById(j.id+"_c");if(ce)ce.innerHTML="Stk "+fmtI(cov.stk)+" · VP "+fmtI(cov.vp);
    if(donutCharts[j.id])donutCharts[j.id].destroy();const cv=document.getElementById(j.id);
    if(cv)donutCharts[j.id]=new Chart(cv,{type:'doughnut',data:{labels:['Venta proy.','Remanente'],datasets:[{data:[cov.vp,Math.max(cov.stk-cov.vp,0)],backgroundColor:['#3949ab','#e8eaf6'],borderWidth:0}]},options:{cutout:'62%',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}}}});});}

function sortRows(rows){if(!st.sort){return rows.slice().sort((a,b)=>{const pa=gaPrio(a[1]),pb=gaPrio(b[1]);if(pa!==pb)return pa-pb;return String(a[2]).localeCompare(String(b[2]));});}
  const s=st.sort,d=st.dir;const val=r=>{if(s==='cod')return r[2];if(s==='sa')return r[4]??-1;if(s==='ma')return r[5]??-1;return mval(r,s.m,s.f)??-1;};
  return rows.slice().sort((a,b)=>{const x=val(a),y=val(b);if(typeof x==='string')return d*x.localeCompare(y);return d*(x-y);});}
function setSort(k){const same=JSON.stringify(st.sort)===JSON.stringify(k);st.dir=same?-st.dir:1;st.sort=k;renderTable(visibleRows());}
function ar(k){return JSON.stringify(st.sort)===JSON.stringify(k)?`<span class="ar">${st.dir>0?'▲':'▼'}</span>`:"";}
function renderTable(rows,tId,greenLiq){const t=document.getElementById(tId);rows=sortRows(rows);let _ms=st.mstart.fc||0;_ms=Math.max(0,Math.min(_ms,ALLM.length-4));if(ALLM.length<=4)_ms=0;const MW=ALLM.slice(_ms,_ms+4);
  if(rows.length===0){t.innerHTML='<tbody><tr><td class="empty">Sin resultados con los filtros actuales.</td></tr></tbody>';return;}
  let r1=`<tr class="r1"><th class="idpanel" colspan="7">Stock al ${DATA.stock_ts}</th>`;MW.forEach(m=>{r1+=`<th colspan="6" class="mcol">${DATA.months[m]}</th>`;});r1+="</tr>";
  let r2='<tr class="r2">'+`<th class="id0">UN</th><th class="id1">GA</th><th class="id2">Código</th><th class="id3">Cat</th><th class="id4 num">Ideal</th><th class="id5 num">Stock</th><th class="id6 num">Meses</th>`;
  MW.forEach((m,mi)=>{MSHORT.forEach((f,fi)=>{const mc=(mi%2)?' mo':'';r2+=`<th class="num f${fi}${fi===0?' mg-a':''}${mc}">${f}</th>`;});});r2+="</tr>";
  const cap=1200;const show=rows.slice(0,cap);let body="";
  show.forEach(r=>{const id=r[IDEAL];body+="<tr>"+
    `<td class="id0">${DATA.UN[r[0]]}</td><td class="id1">${DATA.GA[r[1]]}</td><td class="id2 code">${r[2]}</td><td class="id3"><span class="cat cat-${DATA.CAT[r[3]]}">${DATA.CAT[r[3]]}</span></td><td class="id4 num">${fmtCat(id)}</td><td class="id5 num">${fmtI(r[4])}</td><td class="id6 num">${mcell(r[5],id,!!(greenLiq&&st.liq&&id>0&&r[5]>id*st.liq))}</td>`;
    MW.forEach((m,mi)=>{const mc=(mi%2)?' mo':'';for(let f=0;f<6;f++){const v=mval(r,m,f);const isM=(f===1||f===5);let cl="num f"+f+(f===0?" mg-a":"")+mc;
      if(f===2)cl+=(v>0?" t-buy":" t-zero"); else if(f===3)cl+=" t-grn";
      body+=`<td class="${cl}">${isM?mcell(v,id,false):fmtI(v)}</td>`;}});
    body+="</tr>";});
  let foot=`<tr><td class="idpanel" colspan="7">TOTAL · ${rows.length.toLocaleString("es-AR")} códigos${rows.length>cap?' (muestra '+cap+')':''}</td>`;
  MW.forEach((m,mi)=>{let sc=0,sv=0;rows.forEach(r=>{sc+=mval(r,m,2)||0;sv+=mval(r,m,3)||0;});const mc=(mi%2)?' mo':'';
    foot+=`<td class="num f0 mg-a"></td><td class="num f1"></td><td class="num f2 t-buy">${fmtI(sc)}</td><td class="num f3 t-grn">${fmtI(sv)}</td><td class="num f4"></td><td class="num f5"></td>`;});foot+="</tr>";
  const maxLen=rows.reduce((m,r)=>Math.max(m,(r[2]||'').length),4);const cw=Math.min(210,Math.max(92,Math.round(maxLen*7.5+20)));document.documentElement.style.setProperty('--cw',cw+'px');const idW=[66,110,cw,48,48,62,64],fW=[66,62,58,64,66,62];let cg='<colgroup>'+idW.map(w=>`<col style="width:${w}px">`).join('');MW.forEach(()=>{cg+=fW.map(w=>`<col style="width:${w}px">`).join('');});cg+='</colgroup>';
  t.innerHTML=cg+`<thead>${r1}${r2}</thead><tbody>${body}</tbody><tfoot>${foot}</tfoot>`;}

function renderLiqSum(rows){const el=document.getElementById('liqResumen');if(!st.liq){el.innerHTML='<div class="liqsum"><div class="impo-hint">Elegí un factor de liquidación (arriba) para ver los candidatos y el resumen.</div></div>';return;}
  const byGa={};rows.forEach(r=>{const g=DATA.GA[r[1]];(byGa[g]=byGa[g]||{tot:0,cat:{}});byGa[g].tot++;const c=DATA.CAT[r[3]];byGa[g].cat[c]=(byGa[g].cat[c]||0)+1;});
  const gas=Object.keys(byGa).sort((a,b)=>prioName(a)-prioName(b));
